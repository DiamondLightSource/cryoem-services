trigger:
  branches:
    include:
    - '*'
  tags:
    include:
    - '*'

stages:
- stage: static
  displayName: Static Analysis
  jobs:
  - job: checks
    displayName: static code analysis
    pool:
      vmImage: ubuntu-20.04
    steps:
      # Run syntax validation using oldest and latest Python
      - task: UsePythonVersion@0
        displayName: Set up python
        inputs:
          versionSpec: 3.8

      - bash: python .azure-pipelines/syntax-validation.py
        displayName: Syntax validation (3.8)

      - task: UsePythonVersion@0
        displayName: Set up python
        inputs:
          versionSpec: 3.10

      - bash: python .azure-pipelines/syntax-validation.py
        displayName: Syntax validation (3.10)

      # Run flake8 validation on a shallow clone
      - bash: |
          pip install --disable-pip-version-check flake8
          python .azure-pipelines/flake8-validation.py
        displayName: Flake8 validation

- stage: build
  displayName: Build
  dependsOn:
  jobs:
  - job: build
    displayName: build package
    pool:
      vmImage: ubuntu-20.04
    steps:
      - task: UsePythonVersion@0
        displayName: Set up python
        inputs:
          versionSpec: 3.10

      - bash: |
          pip install --disable-pip-version-check collective.checkdocs wheel
        displayName: Install dependencies

      - bash: |
          set -ex
          python setup.py sdist bdist_wheel
          mkdir -p dist/pypi
          shopt -s extglob
          mv -v dist/!(pypi) dist/pypi
          git archive HEAD | gzip > dist/repo-source.tar.gz
          ls -laR dist
        displayName: Build python package

      - task: PublishBuildArtifacts@1
        displayName: Store artifact
        inputs:
          pathToPublish: dist/
          artifactName: package

      - bash: python setup.py checkdocs
        displayName: Check package description

- stage: tests
  displayName: Run unit tests
  dependsOn:
  - static
  - build
  jobs:
  - job: linux
    pool:
      vmImage: ubuntu-20.04
    strategy:
      matrix:
        python38:
          PYTHON_VERSION: 3.8
        python39:
          PYTHON_VERSION: 3.9
        python310:
          PYTHON_VERSION: 3.10
    steps:
    - template: .azure-pipelines/ci.yml

  - job: macOS
    pool:
      vmImage: macOS-latest
    strategy:
      matrix:
        python38:
          PYTHON_VERSION: 3.8
        python39:
          PYTHON_VERSION: 3.9
        python310:
          PYTHON_VERSION: 3.10
    steps:
    - template: .azure-pipelines/ci.yml

